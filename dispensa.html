<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dispensa — NutritionPlanner</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,600;0,9..144,700;1,9..144,300;1,9..144,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header class="site-header">
  <div class="header-eyebrow">Inventario alimenti</div>
  <h1 class="header-title">La mia <em>dispensa</em></h1>
  <div class="header-sub" id="header-sub">—</div>
</header>

<nav class="page-nav">
  <a href="index.html" class="nav-link">Settimane</a>
  <a href="menu.html" class="nav-link">Menù</a>
  <a href="dispensa.html" class="nav-link active">Dispensa</a>
  <a href="index.html?ricettario=1" class="nav-link">Ricettario</a>
  <a href="andamento.html" class="nav-link">Andamento</a>
</nav>

<div class="container">

  <div class="filter-bar" id="location-bar">
    <button class="filter-btn" data-loc="milano" onclick="setLocation('milano')">Milano</button>
    <button class="filter-btn" data-loc="como" onclick="setLocation('como')">Como</button>
  </div>

  <div class="stats-row">
    <div class="stat"><div class="stat-value" id="stat-tot">—</div><div class="stat-label">Totale alimenti</div></div>
    <div class="stat"><div class="stat-value" id="stat-ok" style="color:var(--green)">—</div><div class="stat-label">Disponibili</div></div>
    <div class="stat"><div class="stat-value" id="stat-low" style="color:var(--gold)">—</div><div class="stat-label">In esaurimento</div></div>
    <div class="stat"><div class="stat-value" id="stat-out" style="color:var(--red)">—</div><div class="stat-label">Esauriti</div></div>
  </div>

  <div class="filter-bar">
    <button class="filter-btn" onclick="setFilter('ok',this)">✓ Disponibili</button>
    <button class="filter-btn" onclick="setFilter('low',this)">⚠ In esaurimento</button>
    <button class="filter-btn" onclick="setFilter('out',this)">✗ Esauriti</button>
  </div>

  <div id="loading" class="loader"><div class="spinner"></div> Caricamento dispensa...</div>
  <div id="table-container" style="display:none" id="categories-container"></div>
  <div id="empty" class="empty" style="display:none">
    <div class="icon">🥫</div>
    <p>La dispensa è vuota.<br>Usa la skill <strong>Aggiungi a Dispensa</strong> per inizializzarla.</p>
  </div>

</div>

<div class="footer-note">NutritionPlanner</div>


<script src="js/config.js"></script>
<script>
let allAlimenti = [];
let activeFilter = null;
let currentLocation = localStorage.getItem('_nh_dispensa_loc') || 'milano';

function setLocation(loc) {
  if (loc === currentLocation) return;
  currentLocation = loc;
  localStorage.setItem('_nh_dispensa_loc', loc);
  updateLocationButtons();
  document.getElementById('table-container').style.display = 'none';
  document.getElementById('empty').style.display = 'none';
  document.getElementById('loading').style.display = 'flex';
  init();
}

function updateLocationButtons() {
  document.querySelectorAll('#location-bar .filter-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.loc === currentLocation);
  });
}

function getStatus(a) {
  const qty = parseFloat(a.quantita) || 0;
  const soglia = parseFloat(a.soglia_minima) || 0;
  if (qty <= 0) return 'out';
  if (soglia > 0 && qty <= soglia) return 'low';
  return 'ok';
}

function worstStatus(items) {
  const statuses = items.map(getStatus);
  if (statuses.includes('out')) return 'out';
  if (statuses.includes('low')) return 'low';
  return 'ok';
}

// Stato di un prodotto ignorando i lotti già esauriti: un lotto a 0 non deve
// abbassare lo stato degli altri lotti dello stesso prodotto. Se non resta
// nessun lotto disponibile, il prodotto è "out" nel suo complesso.
function productStatus(items) {
  const remaining = items.filter(a => getStatus(a) !== 'out');
  if (remaining.length === 0) return 'out';
  return worstStatus(remaining);
}

function statusPill(s) {
  const map = { ok:'ok ✓ Disponibile', low:'low ⚠ Esaurimento', out:'out ✗ Esaurito' };
  const [cls, ...rest] = map[s].split(' ');
  return `<span class="pill ${cls}">${rest.join(' ')}</span>`;
}

function renderTable(alimenti) {
  const tc = document.getElementById('table-container');
  tc.innerHTML = '';
  if (!alimenti.length) {
    tc.innerHTML = `<p style="color:var(--grey);padding:20px 0;font-size:12px">Nessun alimento trovato.</p>`;
    return;
  }

  // Raggruppa solo per categoria. Ogni voce (lotto/porzione) resta una riga
  // propria e sempre visibile — nessun raggruppamento/collapse per nome.
  const cats = {};
  alimenti.forEach(a => {
    const c = a.categoria || 'Altro';
    if (!cats[c]) cats[c] = [];
    cats[c].push(a);
  });

  Object.entries(cats).sort(([a],[b]) => a.localeCompare(b)).forEach(([cat, items]) => {
    const hdr = document.createElement('div');
    hdr.className = 'cat-header';
    hdr.textContent = cat;
    tc.appendChild(hdr);

    const table = document.createElement('table');
    table.innerHTML = `<thead><tr><th>Alimento</th><th>Quantità</th><th></th><th>Stato</th><th>Scadenza</th></tr></thead>`;
    const tbody = document.createElement('tbody');

    // Ordina per nome (cosi' le voci dello stesso alimento restano vicine),
    // poi per nota, cosi' le porzioni numerate compaiono in ordine.
    items.sort((a, b) => a.nome.localeCompare(b.nome) || String(a.note||'').localeCompare(String(b.note||'')));

    items.forEach(a => {
      const s = getStatus(a);
      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td><strong>${a.nome}</strong>${a.note ? `<br><span style="font-size:10px;color:var(--grey)">${a.note}</span>` : ''}</td>
        <td style="font-weight:600">${a.quantita ?? '—'} <span style="color:var(--grey);font-weight:400">${a.unita||''}</span></td>
        <td style="font-size:14px;text-align:center">${a.congelato ? '❄️' : ''}</td>
        <td>${statusPill(s)}</td>
        <td style="font-size:11px;color:var(--grey)">${a.scadenza || '—'}</td>
      `;
      tbody.appendChild(tr);
    });

    table.appendChild(tbody);
    tc.appendChild(table);
  });
}

function filterTable() {
  let f;
  if (activeFilter === 'out') {
    // Mostra solo i singoli lotti esauriti
    f = allAlimenti.filter(a => getStatus(a) === 'out');
  } else if (activeFilter) {
    // ok / low: i lotti esauriti non compaiono mai qui e non influenzano
    // lo stato dei lotti superstiti dello stesso prodotto
    const nonOut = allAlimenti.filter(a => getStatus(a) !== 'out');
    const nomiDaIncludere = new Set();
    nonOut.forEach(a => { if (getStatus(a) === activeFilter) nomiDaIncludere.add(a.nome); });
    f = nonOut.filter(a => nomiDaIncludere.has(a.nome));
  } else {
    // Default (Disponibili): nascondi ogni lotto esaurito; i lotti rimanenti
    // dello stesso prodotto mantengono il proprio stato invariato
    f = allAlimenti.filter(a => getStatus(a) !== 'out');
  }
  renderTable(f);
}

function setFilter(f, btn) {
  if (activeFilter === f) {
    activeFilter = null;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  } else {
    activeFilter = f;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  }
  filterTable();
}

async function init() {
  try {
    updateLocationButtons();
    const d = await fetchData(CONFIG.paths.dispensaLoc(currentLocation));
    allAlimenti = d.alimenti || [];
    document.getElementById('loading').style.display = 'none';
    const locLabel = currentLocation === 'como' ? 'Como' : 'Milano';
    document.getElementById('header-sub').textContent = `${locLabel} — Aggiornata il ${d.ultimo_aggiornamento || '—'}`;

    // Stats per prodotto unico: i lotti esauriti non abbassano lo stato dei lotti
    // rimanenti dello stesso prodotto (vedi productStatus)
    const grouped = allAlimenti.reduce((acc, a) => { (acc[a.nome] = acc[a.nome]||[]).push(a); return acc; }, {});
    const prodotti = Object.values(grouped);
    const ok = prodotti.filter(g => productStatus(g) === 'ok').length;
    const low = prodotti.filter(g => productStatus(g) === 'low').length;
    const out = prodotti.filter(g => productStatus(g) === 'out').length;
    document.getElementById('stat-tot').textContent = prodotti.length;
    document.getElementById('stat-ok').textContent = ok;
    document.getElementById('stat-low').textContent = low;
    document.getElementById('stat-out').textContent = out;

    if (!allAlimenti.length) { document.getElementById('empty').style.display = 'block'; return; }
    document.getElementById('table-container').style.display = 'block';
    filterTable();
  } catch(e) {
    document.getElementById('loading').innerHTML = `<span style="color:#9c2a52">Errore: ${e.message}</span>`;
  }
}
init();
</script>
</body>
</html>
