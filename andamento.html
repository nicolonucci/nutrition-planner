<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Andamento — NutritionPlanner</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,600;0,9..144,700;1,9..144,300;1,9..144,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <style>
    /* ── HEALTH PAGE SPECIFICS ── */
    .health-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 12px;
    }
    @media (max-width: 500px) {
      .health-grid { grid-template-columns: 1fr; }
      .health-grid .span2 { grid-column: 1; }
    }
    .health-grid .span2 { grid-column: 1 / -1; }

    .chart-card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 1px 8px rgba(0,0,0,.07);
      border: 1.5px solid var(--mid);
      padding: 16px;
      overflow: hidden;
    }
    .chart-title {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--grey);
      margin-bottom: 14px;
    }
    .chart-wrap {
      position: relative;
      height: 180px;
    }
    .chart-wrap.tall { height: 220px; }

    /* ── LATEST WEEK HERO ── */
    .week-hero {
      background: var(--black);
      color: #fff;
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 12px;
      position: relative;
      overflow: hidden;
    }
    .week-hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(-55deg, transparent, transparent 44px, rgba(255,255,255,.015) 44px, rgba(255,255,255,.015) 45px);
      pointer-events: none;
    }
    .hero-label {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #555;
      margin-bottom: 4px;
    }
    .hero-dates {
      font-family: 'Fraunces', serif;
      font-size: clamp(16px, 4vw, 22px);
      font-weight: 600;
      color: #fff;
      margin-bottom: 16px;
    }
    .hero-stats {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
      gap: 12px;
    }
    .hero-stat { }
    .hero-stat .hs-val {
      font-family: 'Fraunces', serif;
      font-size: 22px;
      font-weight: 700;
      color: #fff;
      line-height: 1.1;
    }
    .hero-stat .hs-val .hs-unit {
      font-size: 12px;
      font-weight: 300;
      color: #aaa;
      margin-left: 2px;
    }
    .hero-stat .hs-delta {
      font-size: 11px;
      margin-top: 1px;
    }
    .hero-stat .hs-delta.pos { color: #6dbd94; }
    .hero-stat .hs-delta.neg { color: #e88aaa; }
    .hero-stat .hs-delta.neu { color: #888; }
    .hero-stat .hs-lbl {
      font-size: 10px;
      color: #555;
      margin-top: 2px;
      letter-spacing: .5px;
    }

    /* ── ALLENAMENTI LIST ── */
    .workout-list { list-style: none; }
    .workout-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 0;
      border-bottom: 1px solid var(--mid);
    }
    .workout-item:last-child { border-bottom: none; }
    .workout-ic {
      width: 36px; height: 36px;
      border-radius: 10px;
      background: var(--blue-l);
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
    }
    .workout-info { flex: 1; min-width: 0; }
    .workout-tipo {
      font-weight: 600;
      font-size: 13px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .workout-meta { font-size: 11px; color: var(--grey); margin-top: 1px; }
    .workout-kcal {
      font-family: 'Fraunces', serif;
      font-size: 15px;
      font-weight: 600;
      color: var(--orange);
      white-space: nowrap;
    }

    /* ── EMPTY STATE ── */
    .health-empty {
      text-align: center;
      padding: 60px 20px;
      color: var(--grey);
    }
    .health-empty .icon { font-size: 48px; margin-bottom: 16px; }
    .health-empty p { font-size: 14px; line-height: 1.6; }
    .health-empty strong { color: var(--black); }

    /* ── BADGE variazione peso ── */
    .peso-badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
    }
    .peso-badge.down { background: var(--green-l); color: var(--green); }
    .peso-badge.up   { background: var(--red-l);   color: var(--red);   }
    .peso-badge.same { background: var(--mid);      color: var(--grey);  }

    /* ── DATA TAG ── */
    .data-tag {
      font-size: 10px;
      color: var(--grey);
      margin-top: 6px;
      text-align: right;
    }
  </style>
</head>
<body>

<header class="site-header">
  <div class="header-eyebrow">Performance & benessere</div>
  <h1 class="header-title">Il mio <em>andamento</em></h1>
  <div class="header-sub" id="header-sub">Apple Health · dati aggiornati</div>
</header>

<nav class="page-nav">
  <a href="index.html" class="nav-link">Settimane</a>
  <a href="menu.html" class="nav-link">Menù</a>
  <a href="dispensa.html" class="nav-link">Dispensa</a>
  <a href="ricettario.html" class="nav-link">Ricettario</a>
  <a href="andamento.html" class="nav-link active">Andamento</a>
</nav>

<div class="container" id="main-content">
  <div id="loading" class="loader"><div class="spinner"></div> Caricamento dati salute...</div>
  <div id="content" style="display:none"></div>
  <div id="empty" class="health-empty" style="display:none">
    <div class="icon">❤️</div>
    <p>Nessun dato ancora presente.<br>Carica il tuo export Apple Health e usa la skill <strong>Apple Health</strong> per iniziare.</p>
  </div>
</div>

<div class="footer-note">NutritionPlanner · dati da Apple Health</div>

<script src="js/config.js"></script>
<script>
// ── CHART.JS DEFAULTS ──────────────────────────────────────────────
Chart.defaults.font.family = "'DM Sans', sans-serif";
Chart.defaults.font.size = 11;
Chart.defaults.color = '#8a8680';
Chart.defaults.plugins.legend.display = false;
Chart.defaults.plugins.tooltip.callbacks = {};

const PALETTE = {
  black:  '#0f0f0f',
  green:  '#1a5c3a',
  greenL: '#6dbd94',
  blue:   '#2040a0',
  blueL:  '#8099e0',
  red:    '#9c2a52',
  redL:   '#e88aaa',
  gold:   '#c47c00',
  goldL:  '#f0cc5a',
  orange: '#a03a00',
  orangeL:'#f09060',
  purple: '#6020a0',
  purpleL:'#b080e0',
  grey:   '#8a8680',
  mid:    '#e5e0d8',
};

// ── UTILS ──────────────────────────────────────────────────────────
function fmtDate(iso) {
  if (!iso) return '—';
  const d = new Date(iso + 'T12:00:00');
  return d.toLocaleDateString('it-IT', { day: 'numeric', month: 'short' });
}

function fmtWeek(isoWeek) {
  if (!isoWeek) return '—';
  const [year, wPart] = isoWeek.split('-W');
  const week = parseInt(wPart);
  const jan4 = new Date(parseInt(year), 0, 4);
  const startW1 = new Date(jan4);
  startW1.setDate(jan4.getDate() - ((jan4.getDay() + 6) % 7));
  const start = new Date(startW1.getTime() + (week - 1) * 7 * 86400000);
  const end   = new Date(start.getTime() + 6 * 86400000);
  const fmt = d => d.toLocaleDateString('it-IT', { day: 'numeric', month: 'short' });
  return `${fmt(start)} – ${fmt(end)} ${end.getFullYear()}`;
}

function fmtNum(n, decimals = 0) {
  if (n == null) return '—';
  return Number(n).toLocaleString('it-IT', { minimumFractionDigits: decimals, maximumFractionDigits: decimals });
}

function fmtOre(ore) {
  if (ore == null) return '—';
  const h = Math.floor(ore);
  const m = Math.round((ore - h) * 60);
  return `${h}h ${m > 0 ? m + 'm' : ''}`.trim();
}

function workoutIcon(tipo) {
  const t = (tipo || '').toLowerCase();
  if (t.includes('corsa') || t.includes('run')) return '🏃';
  if (t.includes('ciclismo') || t.includes('cycling') || t.includes('bici')) return '🚴';
  if (t.includes('nuoto') || t.includes('swim')) return '🏊';
  if (t.includes('forza') || t.includes('strength') || t.includes('functional')) return '🏋️';
  if (t.includes('yoga')) return '🧘';
  if (t.includes('camminata') || t.includes('walk')) return '🚶';
  if (t.includes('hiit')) return '⚡';
  if (t.includes('calcio') || t.includes('soccer')) return '⚽';
  if (t.includes('tennis')) return '🎾';
  return '💪';
}

// ── MAIN RENDER ────────────────────────────────────────────────────
async function init() {
  const loader  = document.getElementById('loading');
  const content = document.getElementById('content');
  const empty   = document.getElementById('empty');

  try {
    const data = await fetchData(CONFIG.paths.health_history);
    const settimane = (data.settimane || []).slice().sort((a, b) => a.settimana > b.settimana ? 1 : -1);

    if (!settimane.length) {
      loader.style.display = 'none';
      empty.style.display = 'block';
      return;
    }

    const ultima = settimane[settimane.length - 1];
    document.getElementById('header-sub').textContent =
      `Apple Health · ${fmtWeek(ultima.settimana)}`;

    content.innerHTML = buildPage(settimane, ultima);
    loader.style.display = 'none';
    content.style.display = 'block';

    renderCharts(settimane, ultima);

  } catch (e) {
    loader.style.display = 'none';
    empty.style.display = 'block';
    console.error(e);
  }
}

// ── BUILD HTML ─────────────────────────────────────────────────────
function buildPage(settimane, ultima) {
  return `
    ${buildHero(ultima)}
    ${buildChartGrid(settimane, ultima)}
  `;
}

function buildHero(s) {
  const peso = s.peso || {};
  const passi = s.passi || {};
  const kcal  = s.calorie_attive || {};
  const sonno = s.sonno || {};
  const allenamenti = s.allenamenti || [];

  const pesoVal = peso.ultimo_kg != null ? fmtNum(peso.ultimo_kg, 1) : '—';
  const pesoDelta = peso.variazione_kg;
  const deltaClass = pesoDelta == null ? 'neu' : (pesoDelta < 0 ? 'pos' : (pesoDelta > 0 ? 'neg' : 'neu'));
  const deltaText = pesoDelta == null ? '' :
    `${pesoDelta > 0 ? '+' : ''}${fmtNum(pesoDelta, 1)} kg settimana`;

  const nAllen = allenamenti.length;

  return `
  <div class="week-hero">
    <div class="hero-label">Ultima settimana</div>
    <div class="hero-dates">${fmtWeek(s.settimana)}</div>
    <div class="hero-stats">
      ${peso.ultimo_kg != null ? `
      <div class="hero-stat">
        <div class="hs-val">${pesoVal}<span class="hs-unit">kg</span></div>
        ${deltaText ? `<div class="hs-delta ${deltaClass}">${deltaText}</div>` : ''}
        <div class="hs-lbl">Peso</div>
      </div>` : ''}
      ${passi.media_giorno != null ? `
      <div class="hero-stat">
        <div class="hs-val">${fmtNum(Math.round(passi.media_giorno))}<span class="hs-unit">/g</span></div>
        <div class="hs-delta neu">${fmtNum(passi.totale)} tot.</div>
        <div class="hs-lbl">Passi</div>
      </div>` : ''}
      ${kcal.media_giorno != null ? `
      <div class="hero-stat">
        <div class="hs-val">${fmtNum(Math.round(kcal.media_giorno))}<span class="hs-unit">kcal</span></div>
        <div class="hs-delta neu">attive/giorno</div>
        <div class="hs-lbl">Calorie attive</div>
      </div>` : ''}
      ${nAllen > 0 ? `
      <div class="hero-stat">
        <div class="hs-val">${nAllen}<span class="hs-unit">sess.</span></div>
        <div class="hs-delta neu">${allenamenti.map(a => a.tipo).filter((v,i,arr) => arr.indexOf(v) === i).slice(0,2).join(', ')}</div>
        <div class="hs-lbl">Allenamenti</div>
      </div>` : ''}
      ${sonno.media_ore != null ? `
      <div class="hero-stat">
        <div class="hs-val">${fmtOre(sonno.media_ore)}</div>
        <div class="hs-delta neu">media/notte</div>
        <div class="hs-lbl">Sonno</div>
      </div>` : ''}
      ${s.fc_riposo_media != null ? `
      <div class="hero-stat">
        <div class="hs-val">${fmtNum(Math.round(s.fc_riposo_media))}<span class="hs-unit">bpm</span></div>
        <div class="hs-delta neu">a riposo</div>
        <div class="hs-lbl">Freq. cardiaca</div>
      </div>` : ''}
    </div>
  </div>`;
}

function buildChartGrid(settimane, ultima) {
  const hasStoricoLen = settimane.length > 1;
  const hasPeso       = settimane.some(s => s.peso?.ultimo_kg != null);
  const hasPassi      = settimane.some(s => s.passi?.totale != null);
  const hasKcal       = settimane.some(s => s.calorie_attive?.totale != null);
  const hasSonno      = settimane.some(s => s.sonno?.media_ore != null);
  const hasFC         = settimane.some(s => s.fc_riposo_media != null);
  const hasAllen      = (ultima.allenamenti || []).length > 0;
  const hasAllenStoric= settimane.some(s => (s.allenamenti || []).length > 0);

  let html = '';

  // — Peso storico —
  if (hasPeso) {
    html += `
    <div class="sl">Peso corporeo</div>
    <div class="chart-card">
      <div class="chart-title">Andamento peso</div>
      <div class="chart-wrap${!hasStoricoLen ? ' tall' : ''}">
        <canvas id="chart-peso"></canvas>
      </div>
    </div>`;
  }

  // — Passi + calorie (2 col) —
  if (hasPassi || hasKcal) {
    html += `<div class="sl">Attività</div><div class="health-grid">`;
    if (hasPassi) html += `
      <div class="chart-card">
        <div class="chart-title">Passi settimanali</div>
        <div class="chart-wrap"><canvas id="chart-passi"></canvas></div>
      </div>`;
    if (hasKcal) html += `
      <div class="chart-card">
        <div class="chart-title">Calorie attive</div>
        <div class="chart-wrap"><canvas id="chart-kcal"></canvas></div>
      </div>`;
    html += `</div>`;
  }

  // — Allenamenti ultima settimana —
  if (hasAllen) {
    html += `
    <div class="sl">Allenamenti · ${fmtWeek(ultima.settimana)}</div>
    <div class="chart-card">
      ${buildWorkoutList(ultima.allenamenti)}
    </div>`;
  }

  // — Volume allenamenti storico —
  if (hasAllenStoric && hasStoricoLen) {
    html += `
    <div class="health-grid">
      <div class="chart-card">
        <div class="chart-title">Sessioni/settimana</div>
        <div class="chart-wrap"><canvas id="chart-sessions"></canvas></div>
      </div>
      <div class="chart-card">
        <div class="chart-title">Durata totale (min)</div>
        <div class="chart-wrap"><canvas id="chart-durata"></canvas></div>
      </div>
    </div>`;
  }

  // — Sonno + FC (2 col) —
  if (hasSonno || hasFC) {
    html += `<div class="sl">Recupero</div><div class="health-grid">`;
    if (hasSonno) html += `
      <div class="chart-card">
        <div class="chart-title">Ore di sonno (media/notte)</div>
        <div class="chart-wrap"><canvas id="chart-sonno"></canvas></div>
      </div>`;
    if (hasFC) html += `
      <div class="chart-card">
        <div class="chart-title">FC a riposo (bpm)</div>
        <div class="chart-wrap"><canvas id="chart-fc"></canvas></div>
      </div>`;
    html += `</div>`;
  }

  return html;
}

function buildWorkoutList(allenamenti) {
  if (!allenamenti || !allenamenti.length) return '<p style="color:var(--grey);font-size:13px">Nessun allenamento registrato.</p>';
  return `<ul class="workout-list">` +
    allenamenti.map(a => `
      <li class="workout-item">
        <div class="workout-ic">${workoutIcon(a.tipo)}</div>
        <div class="workout-info">
          <div class="workout-tipo">${a.tipo || 'Allenamento'}</div>
          <div class="workout-meta">${a.data ? fmtDate(a.data) : ''}${a.durata_min != null ? ` · ${a.durata_min} min` : ''}</div>
        </div>
        ${a.kcal != null ? `<div class="workout-kcal">${fmtNum(Math.round(a.kcal))} kcal</div>` : ''}
      </li>`).join('') +
    `</ul>`;
}

// ── RENDER CHARTS ──────────────────────────────────────────────────
function renderCharts(settimane, ultima) {
  const labels = settimane.map(s => {
    const [, wPart] = (s.settimana || '').split('-W');
    return `W${wPart}`;
  });

  const gridLine = { color: '#f0ece6', lineWidth: 1 };
  const tickOpts = { color: '#8a8680', font: { size: 10 } };
  const noTick   = { display: false };

  // ── PESO ──
  const pesoData = settimane.map(s => s.peso?.ultimo_kg ?? null);
  if (document.getElementById('chart-peso')) {
    const pMin = Math.min(...pesoData.filter(Boolean)) - 2;
    const pMax = Math.max(...pesoData.filter(Boolean)) + 2;
    new Chart(document.getElementById('chart-peso'), {
      type: 'line',
      data: {
        labels,
        datasets: [{
          data: pesoData,
          borderColor: PALETTE.black,
          backgroundColor: 'rgba(15,15,15,.06)',
          borderWidth: 2,
          pointRadius: 4,
          pointBackgroundColor: PALETTE.black,
          fill: true,
          tension: 0.3,
          spanGaps: true,
        }]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        scales: {
          x: { grid: gridLine, ticks: tickOpts },
          y: {
            min: pMin, max: pMax,
            grid: gridLine, ticks: { ...tickOpts, callback: v => v + ' kg' }
          }
        },
        plugins: {
          tooltip: { callbacks: { label: ctx => `${ctx.raw} kg` } }
        }
      }
    });
  }

  // ── PASSI ──
  if (document.getElementById('chart-passi')) {
    new Chart(document.getElementById('chart-passi'), {
      type: 'bar',
      data: {
        labels,
        datasets: [{
          data: settimane.map(s => s.passi?.totale ?? null),
          backgroundColor: PALETTE.blueL,
          borderColor: PALETTE.blue,
          borderWidth: 1.5,
          borderRadius: 6,
        }]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        scales: {
          x: { grid: { display: false }, ticks: tickOpts },
          y: { grid: gridLine, ticks: { ...tickOpts, callback: v => (v/1000).toFixed(0) + 'k' } }
        },
        plugins: { tooltip: { callbacks: { label: ctx => `${fmtNum(ctx.raw)} passi` } } }
      }
    });
  }

  // ── CALORIE ATTIVE ──
  if (document.getElementById('chart-kcal')) {
    new Chart(document.getElementById('chart-kcal'), {
      type: 'bar',
      data: {
        labels,
        datasets: [{
          data: settimane.map(s => s.calorie_attive?.totale ?? null),
          backgroundColor: PALETTE.orangeL,
          borderColor: PALETTE.orange,
          borderWidth: 1.5,
          borderRadius: 6,
        }]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        scales: {
          x: { grid: { display: false }, ticks: tickOpts },
          y: { grid: gridLine, ticks: { ...tickOpts, callback: v => v + ' kcal' } }
        },
        plugins: { tooltip: { callbacks: { label: ctx => `${fmtNum(ctx.raw)} kcal` } } }
      }
    });
  }

  // ── SESSIONI ALLENAMENTO ──
  if (document.getElementById('chart-sessions')) {
    new Chart(document.getElementById('chart-sessions'), {
      type: 'bar',
      data: {
        labels,
        datasets: [{
          data: settimane.map(s => (s.allenamenti || []).length),
          backgroundColor: PALETTE.purpleL,
          borderColor: PALETTE.purple,
          borderWidth: 1.5,
          borderRadius: 6,
        }]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        scales: {
          x: { grid: { display: false }, ticks: tickOpts },
          y: { grid: gridLine, ticks: { ...tickOpts, stepSize: 1 }, min: 0 }
        },
        plugins: { tooltip: { callbacks: { label: ctx => `${ctx.raw} sessioni` } } }
      }
    });
  }

  // ── DURATA ALLENAMENTO ──
  if (document.getElementById('chart-durata')) {
    new Chart(document.getElementById('chart-durata'), {
      type: 'bar',
      data: {
        labels,
        datasets: [{
          data: settimane.map(s => (s.allenamenti || []).reduce((sum, a) => sum + (a.durata_min || 0), 0) || null),
          backgroundColor: PALETTE.greenL,
          borderColor: PALETTE.green,
          borderWidth: 1.5,
          borderRadius: 6,
        }]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        scales: {
          x: { grid: { display: false }, ticks: tickOpts },
          y: { grid: gridLine, ticks: { ...tickOpts, callback: v => v + ' min' }, min: 0 }
        },
        plugins: { tooltip: { callbacks: { label: ctx => `${ctx.raw} min` } } }
      }
    });
  }

  // ── SONNO ──
  if (document.getElementById('chart-sonno')) {
    new Chart(document.getElementById('chart-sonno'), {
      type: 'line',
      data: {
        labels,
        datasets: [{
          data: settimane.map(s => s.sonno?.media_ore ?? null),
          borderColor: PALETTE.purple,
          backgroundColor: 'rgba(96,32,160,.07)',
          borderWidth: 2,
          pointRadius: 4,
          pointBackgroundColor: PALETTE.purple,
          fill: true,
          tension: 0.3,
          spanGaps: true,
        }, {
          // linea di riferimento 8h
          data: settimane.map(() => 8),
          borderColor: PALETTE.mid,
          borderWidth: 1,
          borderDash: [4, 4],
          pointRadius: 0,
          fill: false,
        }]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        scales: {
          x: { grid: gridLine, ticks: tickOpts },
          y: {
            min: 4, max: 10,
            grid: gridLine,
            ticks: { ...tickOpts, callback: v => v + 'h' }
          }
        },
        plugins: {
          legend: { display: false },
          tooltip: { callbacks: { label: ctx => ctx.datasetIndex === 0 ? fmtOre(ctx.raw) : null } }
        }
      }
    });
  }

  // ── FC ──
  if (document.getElementById('chart-fc')) {
    new Chart(document.getElementById('chart-fc'), {
      type: 'line',
      data: {
        labels,
        datasets: [{
          data: settimane.map(s => s.fc_riposo_media ?? null),
          borderColor: PALETTE.red,
          backgroundColor: 'rgba(156,42,82,.07)',
          borderWidth: 2,
          pointRadius: 4,
          pointBackgroundColor: PALETTE.red,
          fill: true,
          tension: 0.3,
          spanGaps: true,
        }]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        scales: {
          x: { grid: gridLine, ticks: tickOpts },
          y: { grid: gridLine, ticks: { ...tickOpts, callback: v => v + ' bpm' } }
        },
        plugins: { tooltip: { callbacks: { label: ctx => `${Math.round(ctx.raw)} bpm` } } }
      }
    });
  }
}

// ── BOOT ──────────────────────────────────────────────────────────
init();
</script>
</body>
</html>
